<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title">CRM Dashboard - Deals</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>

    <div class="layout">
        <!-- Sidebar Dinâmica -->
        <div id="sidebar-placeholder"></div>

        <main class="main-content">
            <!-- Topbar Dinâmica -->
            <div id="topbar-placeholder"></div>

            <div class="page-header">
                <h1 class="page-title" data-i18n="deals.title">Sales Pipeline</h1>
                <div class="header-controls">
                    <button class="btn-outline" id="btnExportDealsCSV" title="Export Deals to CSV">
                        <span class="iconify" data-icon="ph:file-csv-fill"></span> Export CSV
                    </button>
                    <button class="btn-primary" id="btnOpenAddDeal">
                        <span class="iconify" data-icon="ph:plus-bold"></span> <span data-i18n="deals.addBtn">Create Deal</span>
                    </button>
                </div>
            </div>

            <div class="kanban-board">
                <div class="kanban-column col-prospecting">
                    <div class="kanban-header">
                        <div class="kanban-title"><span class="iconify" data-icon="ph:target-fill" style="color:var(--info)"></span> <span data-i18n="deals.stageProspecting">Prospecting</span></div>
                        <div class="kanban-count" id="countProspecting">0</div>
                    </div>
                    <div class="kanban-cards" id="colProspecting" data-stage="Prospecting"></div>
                </div>

                <div class="kanban-column col-negotiation">
                    <div class="kanban-header">
                        <div class="kanban-title"><span class="iconify" data-icon="ph:chats-teardrop-fill" style="color:var(--warning)"></span> <span data-i18n="deals.stageNegotiation">Negotiation</span></div>
                        <div class="kanban-count" id="countNegotiation">0</div>
                    </div>
                    <div class="kanban-cards" id="colNegotiation" data-stage="Negotiation"></div>
                </div>

                <div class="kanban-column col-won">
                    <div class="kanban-header">
                        <div class="kanban-title"><span class="iconify" data-icon="ph:trophy-fill" style="color:var(--success)"></span> <span data-i18n="deals.stageWon">Closed Won</span></div>
                        <div class="kanban-count" id="countWon">0</div>
                    </div>
                    <div class="kanban-cards" id="colWon" data-stage="Won"></div>
                </div>

                <div class="kanban-column col-lost">
                    <div class="kanban-header">
                        <div class="kanban-title"><span class="iconify" data-icon="ph:x-circle-fill" style="color:var(--danger)"></span> <span data-i18n="deals.stageLost">Closed Lost</span></div>
                        <div class="kanban-count" id="countLost">0</div>
                    </div>
                    <div class="kanban-cards" id="colLost" data-stage="Lost"></div>
                </div>
            </div>

        </main>
    </div>

    <!-- MODAL EXPORTAR CSV -->
    <div class="modal-overlay" id="exportCsvModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><span class="iconify" data-icon="ph:file-csv-fill"></span> Export CSV Data</h3>
                <button class="btn-close" id="closeExportModal"><span class="iconify" data-icon="ph:x-bold"></span></button>
            </div>
            <div class="modal-body">
                <p style="color: var(--text-muted); font-size: 15px; margin-bottom: 24px;" id="exportModalText">Name your file to save your deals data offline.</p>
                <div class="form-group">
                    <label class="form-label">File Name</label>
                    <input type="text" id="csvFileNameInput" class="form-control" placeholder="e.g. NexusCRM_Data">
                </div>
                <div style="margin-top: 32px; display: flex; justify-content: flex-end; gap: 16px;">
                    <button class="btn-outline" id="cancelExportBtn">Cancel</button>
                    <button class="btn-primary" id="confirmExportBtn"><span class="iconify" data-icon="ph:download-simple-fill"></span> Download</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CRUD DEALS -->
    <div class="modal-overlay" id="crudDealModal">
        <div class="modal-content large">
            <div class="modal-header">
                <h3 class="modal-title" id="dealModalTitle"><span class="iconify" data-icon="ph:handshake-fill"></span> Create New Deal</h3>
                <button class="btn-close" id="closeDealModal"><span class="iconify" data-icon="ph:x-bold"></span></button>
            </div>
            <div class="modal-body">
                <form id="formCreateDeal">
                    <input type="hidden" id="dealId" value="">

                    <div class="form-group">
                        <label class="form-label">Deal Title</label>
                        <input type="text" id="dealTitle" class="form-control" placeholder="e.g. Q4 Server Expansion" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Associated Client (Account)</label>
                        <div class="custom-dropdown" id="dealClientDropdown" data-current-value="">
                            <div class="dropdown-header"><span>Select a client...</span> <span class="iconify" data-icon="ph:caret-down-fill"></span></div>
                            <div class="dropdown-list" id="dealClientList"></div>
                        </div>
                        <input type="hidden" id="dealClientSelect" value="" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Estimated Value ($)</label>
                            <input type="number" id="dealValue" class="form-control" placeholder="10000" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Expected Close Date</label>
                            <input type="date" id="dealDate" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Pipeline Stage</label>
                            <div class="custom-dropdown" id="dealStageDropdown" data-current-value="Prospecting">
                                <div class="dropdown-header"><span>Prospecting</span> <span class="iconify" data-icon="ph:caret-down-fill"></span></div>
                                <div class="dropdown-list">
                                    <div data-value="Prospecting">Prospecting</div>
                                    <div data-value="Negotiation">Negotiation</div>
                                    <div data-value="Won">Closed Won</div>
                                    <div data-value="Lost">Closed Lost</div>
                                </div>
                            </div>
                            <input type="hidden" id="dealStage" value="Prospecting">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Probability (%)</label>
                            <input type="number" id="dealProb" class="form-control" value="30" max="100" min="0">
                        </div>
                    </div>

                    <div style="margin-top: 40px; display: flex; justify-content: flex-end; gap: 16px;">
                        <button type="button" class="btn-outline" id="cancelDealBtn">Cancel</button>
                        <button type="submit" class="btn-primary" id="saveDealBtn">Save Deal</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/data.js"></script>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script src="js/deals.js"></script>
</body>
</html>
